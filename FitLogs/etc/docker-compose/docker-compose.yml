services:
  fitlogs-blazor:
    image: fitlogs-blazor:latest
    container_name: fitlogs-blazor
    build:
      context: ../../
      dockerfile: src/FitLogs.Blazor/Dockerfile.local
    environment:
      - ASPNETCORE_URLS=https://+:8081;http://+:8080;
      - Kestrel__Certificates__Default__Path=/app/certs/localhost.pfx
      - Kestrel__Certificates__Default__Password=f25d87e2-b70d-458f-b4d9-16edc40d1751
      - App__SelfUrl=https://localhost:44355
      - App__HealthCheckUrl=http://fitlogs-blazor:8080/health-status
      - AuthServer__RequireHttpsMetadata=false      
      - AuthServer__Authority=http://fitlogs-blazor:8080
      - ConnectionStrings__Default=User ID=postgres;Password=myPassw0rd;Host=postgres;Port=5432;Database=FitLogs;Pooling=false;
    ports:
      - "44355:8081"
    depends_on:    
      postgres:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./certs:/app/certs
    networks:
      - abp-network

  db-migrator:
    image: fitlogs-db-migrator:latest
    container_name: db-migrator
    build:
      context: ../../
      dockerfile: src/FitLogs.DbMigrator/Dockerfile.local
    environment:
      - OpenIddict__Applications__FitLogs_BlazorWebApp__RootUrl=https://localhost:44355
      - OpenIddict__Applications__FitLogs_Swagger__RootUrl=https://localhost:44314
      - ConnectionStrings__Default=User ID=postgres;Password=myPassw0rd;Host=postgres;Port=5432;Database=FitLogs;Pooling=false;
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - abp-network
  
  postgres:
    container_name: postgres-db
    image: postgres:14.1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "myPassw0rd"
    volumes:
      - postgres_data:/var/opt/postgres
    networks: 
      - abp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5    

volumes:
  postgres_data:
    name: fitlogs_postgres_data
networks:
  abp-network:
    name: fitlogs-network
    driver: bridge
